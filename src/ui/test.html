<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
body { background:#fff; color:#000; padding:20px; }
.row { margin:10px 0; }
.name { display:inline-block; width:140px; }
.g  { font-family: Georgia, serif; font-size:13px; }
.t  { font-family: "Times New Roman", serif; font-size:13px; }
.c  { font-family: Consolas, monospace; font-size:13px; }
.cn { font-family: "Courier New", monospace; font-size:13px; }
</style>
</head>
<body>
<div class="row"><span class="name">Georgia</span><span class="g">0123456789 111111 000000</span></div>
<div class="row"><span class="name">Times New Roman</span><span class="t">0123456789 111111 000000</span></div>
<div class="row"><span class="name">Consolas</span><span class="c">0123456789 111111 000000</span></div>
<div class="row"><span class="name">Courier New</span><span class="cn">0123456789 111111 000000</span></div>
</body>
</html>
